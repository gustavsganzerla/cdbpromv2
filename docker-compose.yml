version: "3.9"

services:

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  flask:
    build:
      context: ./flask_api
    container_name: prediction_service
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5001:5000"

  django:
    build:
      context: ./django
    container_name: django_frontend
    restart: always
    depends_on:
      - db
      - flask
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./django:/app
      - ./data:/data

volumes:
  postgres_data: