{% extends 'base.html'%}
{% load static %}

{% block title %}Supported Organisms{% endblock %}
{% block content%}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organism Count by Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        .table-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f4f6f9; color: #555; font-weight: 600; }
        tr:hover { background-color: #f1f3f5; }
        .view-btn { color: #007bff; text-decoration: none; font-size: 1.1rem; }
        .view-btn:hover { color: #0056b3; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Organisms Per Group Summary</h2>
    <table>
        <thead>
            <tr>
                <th>Group Name</th>
                <th class="text-center">Unique Bacteria Count</th>
                <th class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody id="summary-table-body">
            <tr>
                <td colspan="3" class="text-center">Loading summary data...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="{% static 'myapp/group_summary.js' %}"></script>
</body>



{%endblock%}
